<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-hidden="true">
  <!-- Simplified companion to master art: arrow + shock-ring + chunky bolts + streaks. -->
  <defs>
    <linearGradient id="ac-arrow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffd87a"/>
      <stop offset="40%" stop-color="#e89418"/>
      <stop offset="100%" stop-color="#8a4a0a"/>
    </linearGradient>
    <linearGradient id="ac-core" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe89e"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="31" height="31" rx="4" ry="4" fill="#0a0b0d" stroke="#363a3e" stroke-width="1"/>
  <rect x="14.2" y="8" width="3.6" height="18" rx="1.6" fill="#2a2418" opacity="0.5"/>
  <!-- Motion streaks -->
  <rect x="5.5" y="11" width="1.8" height="12" rx="0.9" fill="#f0b030" opacity="0.55"/>
  <rect x="8.8" y="12" width="1.6" height="10" rx="0.8" fill="#f0b030" opacity="0.45"/>
  <rect x="21.6" y="11.5" width="1.8" height="11" rx="0.9" fill="#f0b030" opacity="0.55"/>
  <rect x="24.8" y="12" width="1.6" height="10" rx="0.8" fill="#f0b030" opacity="0.45"/>
  <!-- Arrow body -->
  <path d="M16 25.4 L7.8 9.2h16.4z" fill="url(#ac-arrow)"/>
  <path d="M16 23.2 L10.4 11.4h11.2z" fill="url(#ac-core)" opacity="0.95"/>
  <path d="M16 22.2 L12.2 13.2h7.6z" fill="#fffef8" opacity="0.92"/>
  <!-- Shock-ring -->
  <ellipse cx="16" cy="14.2" rx="10.5" ry="3.2" fill="none" stroke="#ffcf55" stroke-width="1.4"/>
  <ellipse cx="16" cy="14.2" rx="8.8" ry="2.4" fill="none" stroke="#fff6cc" stroke-width="0.55" opacity="0.85"/>
  <!-- Chunky lightning -->
  <path d="M7 15.5 L10.5 17.8 L11.8 22" fill="none" stroke="#6ec4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7 15.5 L10.5 17.8 L11.8 22" fill="none" stroke="#f0fbff" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M25 16.2 L21.5 18.4 L20.2 22" fill="none" stroke="#6ec4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M25 16.2 L21.5 18.4 L20.2 22" fill="none" stroke="#f0fbff" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
