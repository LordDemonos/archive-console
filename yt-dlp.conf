# This is the base configuration used for the other scripts.
# Look through it and comment/uncomment lines according to how you want them.
# Entry points for batch files: BAT_FILES.md (Watch Later: monthly_watch_later_archive.bat;
# channels: monthly_channels_archive.bat / archive_channel_run.py;
# video list: monthly_videos_archive.bat / archive_video_run.py).

# Use cookies to bypass things such as age-restrictions and paid/member content.
#
# Long runs: if cookies expire mid-run, optional pause when stderr looks like auth failure:
#   set ARCHIVE_PAUSE_ON_COOKIE_ERROR=1
#   set ARCHIVE_COOKIE_AUTH_POLL_SEC=30   (optional: wait until cookies.txt mtime changes)
# See ARCHIVE_PLAYLIST_RUN_LOGS.txt ("Cookie / session heuristics").
#--cookies-from-browser firefox

# You can also get cookies from your browser automatically.
#--cookies-from-browser chrome

# You can also get cookies from your browser automatically.
--cookies cookies.txt

# Watch Later (playlists_input list=WL): if YouTube says the playlist does not exist,
# try browser cookies instead of cookies.txt (comment --cookies above, uncomment ONE line):
#   --cookies-from-browser chrome
#   --cookies-from-browser firefox
# Close extra browser profiles first; yt-dlp reads the live session cookie.

# Not using ipv6 can sometimes prevent 429 bans.
--force-ipv4

# Sleeping between requests prevents 429 bans.
# Increased to 8 seconds for large Watch Later lists
--sleep-requests 8.0

# Additional sleep between videos for large playlists
--sleep-interval 2.0

# Retry options for rate limiting
--retries 10
--fragment-retries 10
--file-access-retries 10

# Verbose output (debug lines; can bury the default download progress bar in a busy console).
# Comment out --verbose if you want a cleaner progress line during monthly archive runs (no other semantics change).
--verbose

# If errors are not ignored, downloading playlists/channels
#  stops on an error, which means the rest won't be downloaded
#  if one video is deleted/privated, or otherwise broken.
--ignore-errors

# Write useful metadata
#--write-info-json
#--write-description
#--write-thumbnail
#--write-sub

# Embed metadata into file, I personally don't recommend these.
#--embed-subs
#--embed-thumbnail
#--embed-metadata
#--embed-chapters
#--embed-info-json

# Download comments (slow)
#--write-comments

# Write all normal subtitles and live chat.
#--sub-langs alld

# For no live chat, use this instead.
#--sub-langs all,-live_chat

# To also download auto-generated and auto-translated subtitles.
# Not recommended because these downloads are pretty slow.
#--write-auto-subs


# The default format selection/sorting of yt-dlp is excellent,
#  so use these flags only if you need them.

# Limit downloads to 1080p or lower
#--format-sort "res:1080"

# Download only as mp4.
#--format bestvideo[ext=mp4]+bestaudio[ext=m4a]

# Format goals: (1) highest success rate, (2) highest video quality, (3) video-only when
# practical — not required (merged or progressive files are OK).
#
# Merge-first: YouTube’s best resolution is usually separate video+audio (DASH). Merged first
# also avoids picking a DASH video-only stream that fails while a progressive "best" would work
# (earlier branches win whenever they match any format — fallbacks only run if a branch matches nothing).
#
# bestvideo+bestaudio = compatibility path (youtube-dl-style) when bv*+ba pairing is odd.
# bestvideo* = video-only when separate merge isn’t available.
# best / worst = single-file progressive, then last resort so selection rarely comes up empty.
--format bestvideo*+bestaudio/bestvideo+bestaudio/bestvideo*/best/worst

# Download only the audio.
#--format bestaudio

# Download only the audio as mp3.
#--format bestaudio
#--extract-audio
#--audio-format mp3


# Mux merged streams as mkv — fewer ffmpeg failures with mixed codecs than default mp4.
# Comment out if you need mp4 containers specifically.
--merge-output-format mkv

# Use aria2c for downloads. Comment if you don't have aria2 installed.
--external-downloader aria2c

# Don't download active livestreams (still downloads past streams)
--match-filter "!is_live"

# Don't download any livestreams at all
#--match-filter "!is_live & !live"

# Do NOT use --check-formats here: it probes each candidate with a real download.
# With YouTube + aria2c, those probes often all fail (rate limits, cookies, CDN),
# which makes yt-dlp think *no* format is available and you get mass
# "Requested format is not available" even though a normal download would work.
--no-check-formats

# --- YouTube: EJS (n challenge) + SABR / missing format URLs (#12482) ---
# Symptom: "n challenge solving failed", "Only images are available", then "Requested format
# is not available" — even with player_client=tv,web_safari,mweb. Cause: YouTube requires solving
# the "n" challenge via External JS (EJS); without a runtime + solver scripts, DASH/HLS URLs are
# never exposed (SABR can hide plain https URLs for web_safari/mweb).
#
# Required (pip): install companion scripts — use monthly bat (pip "yt-dlp[default]") or:
#   python -m pip install -U "yt-dlp[default]"
# Runtime: Node 20+ on PATH (below), OR install Deno 2+ (yt-dlp prefers Deno if present; then
# you can remove --js-runtimes node). Wiki: https://github.com/yt-dlp/yt-dlp/wiki/EJS
--js-runtimes node
# If scripts are missing and npm/GitHub is OK: add --remote-components ejs:github (see wiki).
#
# Cookie-safe clients (android/ios are dropped when logged in — see extractor source):
--extractor-args "youtube:player_client=tv,web_safari,mweb"
# See: https://github.com/yt-dlp/yt-dlp/issues/12482

# Monthly run checklist, env toggles, failure families: ARCHIVE_PLAYLIST_RUN_LOGS.txt


